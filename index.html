<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="DE Pipeline">
<title>DE Pipeline Academy</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #070810;
  --surface: #0e0f1a;
  --surface2: #161728;
  --border: #1e2035;
  --border2: #2a2d4a;
  --text: #e2e4f0;
  --muted: #5a5d7a;
  --muted2: #8486a0;

  /* Stage colors */
  --extract: #00d4ff;
  --transform: #ff6b35;
  --load: #7c3aed;
  --orchestrate: #10b981;
  --dbt: #f59e0b;

  --success: #10b981;
  --warning: #f59e0b;
  --danger: #ef4444;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* GRID BG */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

.app { position:relative; z-index:1; max-width:430px; margin:0 auto; }

/* ── SPLASH SCREEN ── */
#splash {
  position: fixed; inset: 0;
  background: var(--bg);
  z-index: 999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  transition: opacity 0.5s ease, transform 0.5s ease;
}

#splash.hide { opacity:0; transform: scale(1.05); pointer-events:none; }

.splash-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 64px;
  line-height: 1;
  letter-spacing: 4px;
  background: linear-gradient(135deg, var(--extract) 0%, var(--load) 50%, var(--orchestrate) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.splash-sub {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 3px;
  text-transform: uppercase;
}

.splash-pipeline {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 10px;
}

.splash-node {
  width: 10px; height: 10px;
  border-radius: 50%;
  animation: splashPulse 1.5s infinite;
}

.splash-node:nth-child(1) { background: var(--extract); animation-delay: 0s; }
.splash-node:nth-child(3) { background: var(--transform); animation-delay: 0.2s; }
.splash-node:nth-child(5) { background: var(--load); animation-delay: 0.4s; }
.splash-node:nth-child(7) { background: var(--orchestrate); animation-delay: 0.6s; }

.splash-line { width: 24px; height: 1px; background: var(--border2); }

@keyframes splashPulse {
  0%,100% { transform: scale(1); opacity: 0.6; }
  50% { transform: scale(1.4); opacity: 1; }
}

/* ── HEADER ── */
.header {
  padding: 52px 20px 16px;
  position: relative;
}

.header-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}

.header-brand {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 36px;
  letter-spacing: 2px;
  line-height: 1;
  background: linear-gradient(135deg, #fff 0%, var(--extract) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.header-sub {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-top: 4px;
}

.xp-badge {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 8px 12px;
  text-align: center;
}

.xp-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  color: var(--dbt);
  line-height: 1;
}

.xp-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 1px;
}

/* ── PIPELINE VISUAL ── */
.pipeline-visual {
  margin: 16px 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 14px 16px;
}

.pipeline-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 12px;
}

.pipeline-flow {
  display: flex;
  align-items: center;
  gap: 0;
  overflow-x: auto;
  scrollbar-width: none;
}

.pipeline-flow::-webkit-scrollbar { display: none; }

.pipe-stage {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  padding: 0 4px;
}

.pipe-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  border: 1px solid transparent;
  transition: all 0.2s;
  position: relative;
}

.pipe-icon.extract { background: rgba(0,212,255,0.1); border-color: rgba(0,212,255,0.3); }
.pipe-icon.transform { background: rgba(255,107,53,0.1); border-color: rgba(255,107,53,0.3); }
.pipe-icon.load { background: rgba(124,58,237,0.1); border-color: rgba(124,58,237,0.3); }
.pipe-icon.orchestrate { background: rgba(16,185,129,0.1); border-color: rgba(16,185,129,0.3); }
.pipe-icon.dbt { background: rgba(245,158,11,0.1); border-color: rgba(245,158,11,0.3); }

.pipe-name {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 8px;
  color: var(--muted);
  letter-spacing: 0.5px;
  text-align: center;
}

.pipe-arrow {
  flex-shrink: 0;
  color: var(--border2);
  font-size: 14px;
  padding: 0 2px;
  margin-bottom: 16px;
}

.pipe-progress-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--border2);
  transition: background 0.3s;
}

.pipe-progress-dot.lit { background: var(--success); box-shadow: 0 0 6px var(--success); }

/* ── STATS ── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  padding: 0 20px;
  margin-bottom: 16px;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 12px 10px;
  text-align: center;
}

.stat-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  line-height: 1;
}

.stat-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 1px;
  margin-top: 3px;
  text-transform: uppercase;
}

/* ── SECTION TABS ── */
.section-tabs {
  display: flex;
  overflow-x: auto;
  scrollbar-width: none;
  padding: 0 20px;
  gap: 8px;
  margin-bottom: 16px;
}

.section-tabs::-webkit-scrollbar { display: none; }

.stab {
  flex-shrink: 0;
  padding: 7px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border2);
  color: var(--muted2);
  background: transparent;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 5px;
}

.stab-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
}

.stab.active { color: #fff; border-color: transparent; }
.stab.active.extract { background: rgba(0,212,255,0.2); border-color: var(--extract); color: var(--extract); }
.stab.active.transform { background: rgba(255,107,53,0.2); border-color: var(--transform); color: var(--transform); }
.stab.active.load { background: rgba(124,58,237,0.2); border-color: var(--load); color: var(--load); }
.stab.active.orchestrate { background: rgba(16,185,129,0.2); border-color: var(--orchestrate); color: var(--orchestrate); }
.stab.active.dbt { background: rgba(245,158,11,0.2); border-color: var(--dbt); color: var(--dbt); }

/* ── EXERCISE CARDS ── */
.ex-list { padding: 0 20px 100px; display: flex; flex-direction: column; gap: 10px; }

.ex-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 0;
  cursor: pointer;
  overflow: hidden;
  transition: border-color 0.2s, transform 0.15s;
  animation: fadeUp 0.3s ease both;
}

@keyframes fadeUp {
  from { opacity:0; transform: translateY(12px); }
  to { opacity:1; transform: translateY(0); }
}

.ex-card:active { transform: scale(0.98); }

.ex-card-accent {
  height: 3px;
  width: 100%;
}

.ex-card-body { padding: 14px 16px 16px; }

.ex-card-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

.ex-type-pill {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 6px;
  font-weight: 700;
}

.ex-status {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  letter-spacing: 1px;
  color: var(--muted);
}

.ex-status.done { color: var(--success); }
.ex-status.going { color: var(--dbt); }

.ex-title {
  font-size: 16px;
  font-weight: 700;
  line-height: 1.25;
  margin-bottom: 6px;
}

.ex-desc {
  font-size: 13px;
  color: var(--muted2);
  line-height: 1.5;
  margin-bottom: 10px;
}

.ex-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.ex-tools { display: flex; gap: 5px; flex-wrap: wrap; }

.tool-tag {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  padding: 2px 7px;
  border-radius: 4px;
  background: var(--surface2);
  color: var(--muted);
  border: 1px solid var(--border);
}

.ex-xp {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 16px;
  color: var(--dbt);
  letter-spacing: 1px;
}

/* ── EXERCISE TASKS PREVIEW ── */
.ex-tasks-preview {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 6px;
}

.mini-checks { display: flex; gap: 3px; }
.mini-check {
  width: 8px; height: 8px;
  border-radius: 2px;
  background: var(--border2);
}
.mini-check.done { background: var(--success); }
.mini-check.partial { background: var(--dbt); }

.tasks-text {
  font-size: 12px;
  color: var(--muted);
  font-family: 'IBM Plex Mono', monospace;
}

/* ── MODAL ── */
.modal {
  position: fixed; inset: 0;
  background: var(--bg);
  z-index: 100;
  overflow-y: auto;
  transform: translateX(100%);
  transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
  overscroll-behavior: contain;
}

.modal.open { transform: translateX(0); }

.modal-top-bar {
  position: sticky;
  top: 0;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  z-index: 10;
  padding: 52px 16px 12px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.back-btn {
  width: 38px; height: 38px;
  border-radius: 12px;
  border: 1px solid var(--border2);
  background: var(--surface);
  color: var(--text);
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-family: 'IBM Plex Mono', monospace;
}

.modal-title-block { flex: 1; }
.modal-stage-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 3px;
}

.modal-title { font-size: 17px; font-weight: 700; line-height: 1.2; }

.modal-xp {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  color: var(--dbt);
  letter-spacing: 1px;
  flex-shrink: 0;
}

/* ── MODAL CONTENT BLOCKS ── */
.modal-content { padding: 20px; display: flex; flex-direction: column; gap: 20px; }

.block-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 10px;
}

/* Concept block */
.concept-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
  font-size: 14px;
  line-height: 1.7;
  color: var(--muted2);
}

.concept-card strong { color: var(--text); }

.sql-compare {
  margin-top: 12px;
  background: var(--surface2);
  border-radius: 10px;
  padding: 12px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.compare-col { }
.compare-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  letter-spacing: 1px;
  margin-bottom: 6px;
  text-transform: uppercase;
}

.compare-code {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--muted2);
  line-height: 1.6;
}

/* Code block */
.code-wrap {
  background: #05060e;
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
}

.code-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
}

.code-filename {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--muted);
}

.copy-btn {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  padding: 4px 10px;
  border-radius: 6px;
  border: 1px solid var(--border2);
  background: var(--surface2);
  color: var(--muted2);
  cursor: pointer;
  letter-spacing: 1px;
}

.code-body {
  padding: 14px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  line-height: 1.8;
  overflow-x: auto;
  color: #8892b0;
}

.code-body .kw { color: #ff79c6; }
.code-body .fn { color: #82aaff; }
.code-body .str { color: #a8ff78; }
.code-body .cm { color: #495670; font-style: italic; }
.code-body .num { color: #ffb86c; }
.code-body .cls { color: #f1fa8c; }

/* Tasks */
.task-list { display: flex; flex-direction: column; gap: 8px; }

.task-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 13px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.2s;
  user-select: none;
}

.task-item:active { transform: scale(0.98); }

.task-item.done {
  background: rgba(16,185,129,0.05);
  border-color: rgba(16,185,129,0.2);
}

.task-cb {
  width: 22px; height: 22px;
  border-radius: 7px;
  border: 2px solid var(--border2);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  margin-top: 1px;
  transition: all 0.2s;
}

.task-item.done .task-cb {
  background: var(--success);
  border-color: var(--success);
  color: #000;
  font-weight: 700;
}

.task-body { flex: 1; }

.task-label {
  font-size: 14px;
  font-weight: 500;
  line-height: 1.4;
  margin-bottom: 3px;
}

.task-item.done .task-label { text-decoration: line-through; color: var(--muted); }

.task-type {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 1px;
  text-transform: uppercase;
}

.task-type.guided { color: var(--extract); }
.task-type.challenge { color: var(--transform); }

/* Hint */
.hint-card {
  border-radius: 14px;
  padding: 14px;
  font-size: 13px;
  line-height: 1.6;
}

.hint-card.warning {
  background: rgba(245,158,11,0.08);
  border: 1px solid rgba(245,158,11,0.25);
  color: #d4a843;
}

.hint-card.info {
  background: rgba(0,212,255,0.06);
  border: 1px solid rgba(0,212,255,0.2);
  color: #7ecfdf;
}

.hint-title {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 6px;
}

/* Real World box */
.realworld-card {
  background: linear-gradient(135deg, rgba(124,58,237,0.1), rgba(0,212,255,0.06));
  border: 1px solid rgba(124,58,237,0.25);
  border-radius: 14px;
  padding: 14px;
}

.realworld-title {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  color: var(--load);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.realworld-text {
  font-size: 13px;
  color: var(--muted2);
  line-height: 1.6;
}

/* AI Tutor */
.ai-tutor {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
}

.ai-tutor-header {
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}

.ai-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--success);
  box-shadow: 0 0 6px var(--success);
  animation: aiBlink 2s infinite;
}

@keyframes aiBlink { 0%,100%{opacity:1} 50%{opacity:0.4} }

.ai-tutor-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--muted2);
  letter-spacing: 1px;
}

.ai-messages {
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-height: 200px;
  overflow-y: auto;
}

.ai-msg {
  padding: 10px 12px;
  border-radius: 10px;
  font-size: 13px;
  line-height: 1.5;
  max-width: 90%;
}

.ai-msg.bot {
  background: var(--surface2);
  color: var(--muted2);
  border-bottom-left-radius: 4px;
  align-self: flex-start;
}

.ai-msg.user {
  background: rgba(0,212,255,0.1);
  color: var(--extract);
  border: 1px solid rgba(0,212,255,0.2);
  border-bottom-right-radius: 4px;
  align-self: flex-end;
}

.ai-msg.thinking {
  background: var(--surface2);
  color: var(--muted);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
}

.ai-input-row {
  display: flex;
  gap: 8px;
  padding: 10px 12px;
  border-top: 1px solid var(--border);
}

.ai-input {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 10px 12px;
  color: var(--text);
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  outline: none;
  resize: none;
}

.ai-input:focus { border-color: var(--extract); }

.ai-send-btn {
  width: 40px; height: 40px;
  border-radius: 10px;
  background: var(--extract);
  border: none;
  color: #000;
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-weight: 700;
}

/* ── COMPLETE BUTTON ── */
.modal-footer { padding: 0 20px 50px; display: flex; flex-direction: column; gap: 10px; }

.complete-btn {
  padding: 17px;
  border-radius: 16px;
  border: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  width: 100%;
  transition: all 0.2s;
  letter-spacing: 0.5px;
}

.complete-btn:active { transform: scale(0.98); }
.complete-btn.primary { background: var(--success); color: #000; }
.complete-btn.already { background: rgba(16,185,129,0.1); border: 1px solid var(--success); color: var(--success); }

.back-list-btn {
  padding: 14px;
  border-radius: 14px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--muted2);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  width: 100%;
}

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: var(--success);
  color: #000;
  padding: 12px 20px;
  border-radius: 24px;
  font-size: 13px;

<span class="cm"># $ dbt docs generate</span>
<span class="cm"># $ dbt docs serve</span>`,
    tasks: [
      { label: 'Create a schema.yml file in your models/staging/ folder', type: 'guided' },
      { label: 'Add not_null and unique tests to your order_id column', type: 'guided' },
      { label: 'Run: dbt test — see all tests pass in green', type: 'guided' },
      { label: 'Add accepted_values test to your status column', type: 'guided' },
      { label: 'Run: dbt docs generate then dbt docs serve — open the docs website', type: 'guided' },
      { label: 'CHALLENGE: Add a description to every column in your schema.yml', type: 'challenge' },
      { label: 'CHALLENGE: Deliberately break a test (add a null order_id) and see dbt test fail', type: 'challenge' },
    ],
    hint: { type: 'info', title: '💡 Interview Gold', text: 'Being able to show a dbt project with tests and generated documentation in a job interview is one of the most impressive things a junior candidate can do. Screenshot the docs website and add it to your portfolio README.' },
    realworld: 'At companies with mature data teams, every dbt model has documentation and tests. When you run "dbt build" it runs models AND tests in the right order. If any test fails, the pipeline stops — exactly like unit tests in software engineering.',
  },
];

// ─────────────────────────────────────────────
// STATE MANAGEMENT
// ─────────────────────────────────────────────
let state = {};
let currentStage = 'extract';
let currentExIdx = null;

function loadState() {
  try { state = JSON.parse(localStorage.getItem('de_v2') || '{}'); }
  catch(e) { state = {}; }
}

function saveState() {
  try { localStorage.setItem('de_v2', JSON.stringify(state)); } catch(e) {}
}

function getEx(idx) { return state[idx] || { status: 'todo', tasks: [] }; }

// ─────────────────────────────────────────────
// RENDER FUNCTIONS
// ─────────────────────────────────────────────
function renderPipelineFlow() {
  const el = document.getElementById('pipelineFlow');
  let html = '';
  STAGES.forEach((stage, si) => {
    const stageExs = EXERCISES.filter((e, i) => e.stage === stage.id);
    const done = stageExs.filter((e, i) => {
      const globalIdx = EXERCISES.indexOf(e);
      return getEx(globalIdx).status === 'completed';
    }).length;
    const isLit = done > 0;
    html += `
      <div class="pipe-stage" onclick="switchStage('${stage.id}')">
        <div class="pipe-icon ${stage.cls}">${stage.icon}</div>
        <div class="pipe-name">${stage.label}</div>
        <div class="pipe-progress-dot ${isLit ? 'lit' : ''}"></div>
      </div>`;
    if (si < STAGES.length - 1) html += `<div class="pipe-arrow">→</div>`;
  });
  el.innerHTML = html;
}

function renderTabs() {
  const el = document.getElementById('stageTabs');
  el.innerHTML = STAGES.map(s => {
    const count = EXERCISES.filter(e => e.stage === s.id).length;
    const done = EXERCISES.filter((e, i) => e.stage === s.id && getEx(i).status === 'completed').length;
    const active = currentStage === s.id ? 'active ' + s.cls : '';
    return `<button class="stab ${active}" onclick="switchStage('${s.id}')">
      <span class="stab-dot" style="background:${s.color}"></span>
      ${s.label} ${done}/${count}
    </button>`;
  }).join('');
}

function renderExercises() {
  const el = document.getElementById('exList');
  const exs = EXERCISES.map((e, i) => ({...e, idx: i})).filter(e => e.stage === currentStage);
  if (!exs.length) { el.innerHTML = '<div class="empty">No exercises here yet.</div>'; return; }

  el.innerHTML = exs.map((ex, cardI) => {
    const s = getEx(ex.idx);
    const statusLabel = s.status === 'completed' ? '✓ DONE' : s.status === 'in-progress' ? '⟳ STARTED' : '○ TODO';
    const statusClass = s.status === 'completed' ? 'done' : s.status === 'in-progress' ? 'going' : '';
    const stageInfo = STAGES.find(st => st.id === ex.stage);
    const tasksTotal = ex.tasks.length;
    const tasksDone = (s.tasks || []).filter(Boolean).length;

    const miniChecks = ex.tasks.slice(0, 6).map((_, ti) =>
      `<div class="mini-check ${(s.tasks||[])[ti] ? 'done' : ''}"></div>`
    ).join('');

    return `<div class="ex-card" style="animation-delay:${cardI * 0.05}s" onclick="openExercise(${ex.idx})">
      <div class="ex-card-accent" style="background:${stageInfo.color}"></div>
      <div class="ex-card-body">
        <div class="ex-card-top">
          <div class="ex-type-pill" style="background:${stageInfo.color}20;color:${stageInfo.color};border:1px solid ${stageInfo.color}40">${stageInfo.icon} ${stageInfo.label}</div>
          <div class="ex-status ${statusClass}">${statusLabel}</div>
        </div>
        <div class="ex-title">${ex.title}</div>
        <div class="ex-desc">${ex.desc}</div>
        <div class="ex-footer">
          <div class="ex-tools">${ex.tools.map(t => `<span class="tool-tag">${t}</span>`).join('')}</div>
          <div class="ex-xp">+${ex.xp} XP</div>
        </div>
        <div class="ex-tasks-preview">
          <div class="mini-checks">${miniChecks}</div>
          <div class="tasks-text">${tasksDone}/${tasksTotal} tasks</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderStats() {
  const total = EXERCISES.length;
  const done = EXERCISES.filter((_, i) => getEx(i).status === 'completed').length;
  const inProgress = EXERCISES.filter((_, i) => getEx(i).status === 'in-progress').length;
  const xp = EXERCISES.reduce((acc, ex, i) => acc + (getEx(i).status === 'completed' ? ex.xp : 0), 0);

  document.getElementById('statComplete').textContent = done;
  document.getElementById('statInProgress').textContent = inProgress;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('totalXP').textContent = xp;

  const streak = state.streak || 0;
  document.getElementById('streakNum').textContent = streak;
  document.getElementById('streakMsg').textContent = streak === 0
    ? 'Complete an exercise to start!'
    : streak === 1 ? 'Great start! Keep going!' : `${streak} days strong 💪`;
}

function switchStage(stageId) {
  currentStage = stageId;
  renderTabs();
  renderExercises();
  renderPipelineFlow();
}

// ─────────────────────────────────────────────
// EXERCISE MODAL
// ─────────────────────────────────────────────
function openExercise(idx) {
  currentExIdx = idx;
  const ex = EXERCISES[idx];
  const s = getEx(idx);
  const stageInfo = STAGES.find(st => st.id === ex.stage);

  // Mark in-progress
  if (s.status === 'todo') {
    s.status = 'in-progress';
    state[idx] = s;
    saveState();
  }

  document.getElementById('modalStageLabel').innerHTML =
    `<span style="color:${stageInfo.color}">${stageInfo.icon} ${stageInfo.label} Stage</span>`;
  document.getElementById('modalTitle').textContent = ex.title;
  document.getElementById('modalXP').textContent = `+${ex.xp}XP`;

  // Build content
  const sqlC = ex.sqlCompare;
  let html = `
    <div>
      <div class="block-label" style="color:${stageInfo.color}">// What & Why</div>
      <div class="concept-card">${ex.concept}
        <div class="sql-compare">
          <div class="compare-col">
            <div class="compare-label" style="color:var(--extract)">SQL</div>
            <div class="compare-code">${sqlC.sql}</div>
          </div>
          <div class="compare-col">
            <div class="compare-label" style="color:var(--transform)">Python</div>
            <div class="compare-code">${sqlC.pandas}</div>
          </div>
        </div>
      </div>
    </div>

    <div>
      <div class="block-label" style="color:${stageInfo.color}">// Reference Code</div>
      <div class="code-wrap">
        <div class="code-header">
          <span class="code-filename">${ex.filename}</span>
          <button class="copy-btn" onclick="copyCode(this)">COPY</button>
        </div>
        <div class="code-body" id="codeBody">${ex.code}</div>
      </div>
    </div>

    <div>
      <div class="block-label" style="color:${stageInfo.color}">// Your Tasks</div>
      <div class="task-list" id="taskList">
        ${ex.tasks.map((task, ti) => {
          const done = (s.tasks || [])[ti];
          return `<div class="task-item ${done ? 'done' : ''}" onclick="toggleTask(${idx}, ${ti})">
            <div class="task-cb">${done ? '✓' : ''}</div>
            <div class="task-body">
              <div class="task-label">${task.label}</div>
              <div class="task-type ${task.type}">${task.type === 'guided' ? '▶ GUIDED' : '⚡ CHALLENGE'}</div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <div>
      <div class="hint-card ${ex.hint.type}">
        <div class="hint-title">${ex.hint.title}</div>
        ${ex.hint.text}
      </div>
    </div>

    <div>
      <div class="realworld-card">
        <div class="realworld-title">🌍 Real World Context</div>
        <div class="realworld-text">${ex.realworld}</div>
      </div>
    </div>

    <div>
      <div class="block-label" style="color:${stageInfo.color}">// Ask AI Tutor</div>
      <div class="ai-tutor">
        <div class="ai-tutor-header">
          <div class="ai-dot"></div>
          <div class="ai-tutor-label">AI Tutor — ask anything about this exercise</div>
        </div>
        <div class="ai-messages" id="aiMessages">
          <div class="ai-msg bot">Hi! I'm your DE tutor. Ask me anything about ${ex.title} — errors you're getting, concepts you don't understand, or how this applies to real jobs. 💬</div>
        </div>
        <div class="ai-input-row">
          <textarea class="ai-input" id="aiInput" placeholder="e.g. Why do I need try/except here?" rows="1"></textarea>
          <button class="ai-send-btn" onclick="askTutor()">↑</button>
        </div>
      </div>
    </div>
  `;

  document.getElementById('modalContent').innerHTML = html;

  // Complete button state
  const btn = document.getElementById('completeBtn');
  if (s.status === 'completed') {
    btn.textContent = '✓ Already Completed!';
    btn.className = 'complete-btn already';
  } else {
    btn.textContent = `Mark Complete & Earn +${ex.xp} XP`;
    btn.className = 'complete-btn primary';
  }

  document.getElementById('exModal').classList.add('open');
  document.getElementById('exModal').scrollTop = 0;
}

function closeModal() {
  document.getElementById('exModal').classList.remove('open');
  renderStats();
  renderTabs();
  renderExercises();
  renderPipelineFlow();
}

function toggleTask(exIdx, ti) {
  const s = getEx(exIdx);
  if (!s.tasks) s.tasks = [];
  s.tasks[ti] = !s.tasks[ti];
  state[exIdx] = s;
  saveState();
  renderStats();

  // Re-render task list only
  const ex = EXERCISES[exIdx];
  const taskList = document.getElementById('taskList');
  if (!taskList) return;
  taskList.innerHTML = ex.tasks.map((task, i) => {
    const done = (s.tasks || [])[i];
    return `<div class="task-item ${done ? 'done' : ''}" onclick="toggleTask(${exIdx}, ${i})">
      <div class="task-cb">${done ? '✓' : ''}</div>
      <div class="task-body">
        <div class="task-label">${task.label}</div>
        <div class="task-type ${task.type}">${task.type === 'guided' ? '▶ GUIDED' : '⚡ CHALLENGE'}</div>
      </div>
    </div>`;
  }).join('');

  if (s.tasks[ti]) showToast('Task done! +XP incoming 🎯');
}

function markComplete() {
  const idx = currentExIdx;
  const ex = EXERCISES[idx];
  const s = getEx(idx);
  if (s.status === 'completed') return;

  s.status = 'completed';
  s.tasks = ex.tasks.map(() => true);
  state[idx] = s;

  // Streak
  const today = new Date().toDateString();
  if (state.lastDay !== today) {
    state.streak = (state.streak || 0) + 1;
    state.lastDay = today;
  }

  saveState();
  renderStats();
  showToast(`+${ex.xp} XP earned! 🔥`);

  const btn = document.getElementById('completeBtn');
  btn.textContent = '✓ Completed!';
  btn.className = 'complete-btn already';

  // Refresh tasks as all done
  const taskList = document.getElementById('taskList');
  if (taskList) {
    taskList.innerHTML = ex.tasks.map((task, i) => `
      <div class="task-item done">
        <div class="task-cb">✓</div>
        <div class="task-body">
          <div class="task-label">${task.label}</div>
          <div class="task-type ${task.type}">${task.type === 'guided' ? '▶ GUIDED' : '⚡ CHALLENGE'}</div>
        </div>
      </div>`).join('');
  }
}

function copyCode(btn) {
  const codeEl = document.getElementById('codeBody');
  if (!codeEl) return;
  navigator.clipboard.writeText(codeEl.innerText).then(() => {
    btn.textContent = 'COPIED!';
    setTimeout(() => btn.textContent = 'COPY', 2000);
  });
}

// ─────────────────────────────────────────────
// AI TUTOR
// ─────────────────────────────────────────────
async function askTutor() {
  const input = document.getElementById('aiInput');
  const messages = document.getElementById('aiMessages');
  const question = input.value.trim();
  if (!question) return;

  const ex = EXERCISES[currentExIdx];
  input.value = '';

  // User message
  messages.innerHTML += `<div class="ai-msg user">${question}</div>`;
  messages.innerHTML += `<div class="ai-msg thinking" id="thinkingMsg">⟳ Thinking...</div>`;
  messages.scrollTop = messages.scrollHeight;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `You are a friendly, practical data engineering tutor helping a beginner in Malaysia land their first DE job. The student knows SQL well (CTEs and subqueries). They are currently doing an exercise called "${ex.title}" in the ${ex.stage} stage. Tools: ${ex.tools.join(', ')}. Keep answers short, practical, beginner-friendly. Always relate Python concepts to SQL when possible. Use simple English. Be encouraging. If they share an error, help debug it step by step.`,
        messages: [{ role: 'user', content: question }]
      })
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || 'Sorry, could not connect.';
    document.getElementById('thinkingMsg')?.remove();
    messages.innerHTML += `<div class="ai-msg bot">${reply.replace(/\n/g, '<br>').replace(/`([^`]+)`/g, '<code style="background:rgba(255,255,255,0.1);padding:1px 4px;border-radius:3px;font-family:IBM Plex Mono,monospace;font-size:11px">$1</code>')}</div>`;
  } catch(e) {
    document.getElementById('thinkingMsg')?.remove();
    messages.innerHTML += `<div class="ai-msg bot">⚠ Could not connect to AI tutor. Check your internet.</div>`;
  }
  messages.scrollTop = messages.scrollHeight;
}

// ─────────────────────────────────────────────
// TOAST
// ─────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  loadState();
  renderPipelineFlow();
  renderTabs();
  renderExercises();
  renderStats();

  // Hide splash after 2s
  setTimeout(() => {
    document.getElementById('splash').classList.add('hide');
    setTimeout(() => document.getElementById('splash').style.display = 'none', 500);
  }, 1800);
});
</script>
</body>
</html>
